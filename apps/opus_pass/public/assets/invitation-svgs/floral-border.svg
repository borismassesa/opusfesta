<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 300 400"
  width="100%"
  height="100%"
  preserveAspectRatio="xMidYMid meet"
>
  <!-- bg-rect: fill → var(--iv-bg) -->
  <rect id="bg-rect" width="300" height="400" fill="var(--iv-bg, #FBF7F2)" />

  <!-- Inner border — stroke → var(--iv-acc) -->
  <rect
    x="14" y="14"
    width="272" height="372"
    fill="none"
    stroke="var(--iv-acc, #A6B89A)"
    stroke-width="0.8"
    stroke-opacity="0.4"
  />

  <!-- Corner dots — fill alternates between accent and muted -->
  <circle cx="14"  cy="14"  r="6" fill="var(--iv-acc, #A6B89A)" fill-opacity="0.6" />
  <circle cx="286" cy="14"  r="6" fill="var(--iv-mut, #5C6B4D)" />
  <circle cx="14"  cy="386" r="6" fill="var(--iv-mut, #5C6B4D)" />
  <circle cx="286" cy="386" r="6" fill="var(--iv-acc, #A6B89A)" fill-opacity="0.6" />

  <text
    x="150" y="168"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="7"
    letter-spacing="3"
    fill="var(--iv-ts, #5C6B4D)"
  >YOU ARE INVITED</text>

  <!-- names-text: fill → var(--iv-tp) -->
  <text
    id="names-text"
    x="150" y="200"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="17"
    font-style="italic"
    fill="var(--iv-tp, #1A1A1A)"
  >Amani &amp; Neema</text>

  <!-- accent-line: stroke → var(--iv-acc) -->
  <line
    id="accent-line"
    x1="131" y1="216"
    x2="169" y2="216"
    stroke="var(--iv-acc, #A6B89A)"
    stroke-width="1"
  />

  <!-- date-text: fill → var(--iv-ts) -->
  <text
    id="date-text"
    x="150" y="230"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="9"
    letter-spacing="1.8"
    fill="var(--iv-ts, #5C6B4D)"
  >22 · 08 · 2026</text>

  <!-- venue-text: fill → var(--iv-mut) -->
  <text
    id="venue-text"
    x="150" y="246"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="7"
    letter-spacing="1.8"
    fill="var(--iv-mut, #7A8A6E)"
  >BAGAMOYO, TANZANIA</text>
</svg>
