<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 300 400"
  width="100%"
  height="100%"
  preserveAspectRatio="xMidYMid meet"
>
  <!-- bg-rect: fill → var(--iv-bg) -->
  <rect id="bg-rect" width="300" height="400" fill="var(--iv-bg, #F5EFE3)" />

  <text
    x="150" y="152"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="8"
    letter-spacing="3.2"
    fill="var(--iv-mut, #8D8D8D)"
  >SAVE THE DATE</text>

  <!-- names-text: fill → var(--iv-tp) -->
  <text
    id="names-text"
    x="150" y="190"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="18"
    fill="var(--iv-tp, #1A1A1A)"
  >Amani &amp; Neema</text>

  <!-- accent-line: stroke → var(--iv-acc) -->
  <line
    id="accent-line"
    x1="125" y1="216"
    x2="175" y2="216"
    stroke="var(--iv-acc, #C4B9A8)"
    stroke-width="0.8"
  />

  <!-- date-text: fill → var(--iv-ts) -->
  <text
    id="date-text"
    x="150" y="232"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="10"
    letter-spacing="2.2"
    fill="var(--iv-ts, #6B6B6B)"
  >22 · 08 · 2026</text>

  <!-- venue-text: fill → var(--iv-mut) -->
  <text
    id="venue-text"
    x="150" y="250"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="8"
    letter-spacing="2.2"
    fill="var(--iv-mut, #8D8D8D)"
  >BAGAMOYO, TANZANIA</text>
</svg>
