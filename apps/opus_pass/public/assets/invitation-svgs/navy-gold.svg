<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 300 400"
  width="100%"
  height="100%"
  preserveAspectRatio="xMidYMid meet"
>
  <!-- bg-rect: fill → var(--iv-bg) -->
  <rect id="bg-rect" width="300" height="400" fill="var(--iv-bg, #1E2D54)" />

  <text
    x="150" y="150"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="8"
    letter-spacing="3.2"
    fill="var(--iv-acc, #E8D9A7)"
  >SAVE THE DATE</text>

  <!-- accent-line: stroke → var(--iv-acc) -->
  <line
    id="accent-line"
    x1="144" y1="164"
    x2="156" y2="164"
    stroke="var(--iv-acc, #E8D9A7)"
    stroke-width="1"
  />

  <!-- names-text: fill → var(--iv-tp) -->
  <text
    id="names-text"
    x="150" y="200"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="18"
    fill="var(--iv-tp, #F5EFE3)"
  >Amani &amp; Neema</text>

  <!-- date-text: fill → var(--iv-ts) -->
  <text
    id="date-text"
    x="150" y="222"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="10"
    letter-spacing="2.2"
    fill="var(--iv-ts, #E8D9A7)"
  >22 · 08 · 2026</text>

  <!-- venue-text: fill → var(--iv-mut) -->
  <text
    id="venue-text"
    x="150" y="238"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="7"
    letter-spacing="2.2"
    fill="var(--iv-mut, #A8986A)"
  >BAGAMOYO, TANZANIA</text>
</svg>
