    <g class="st19">
      <text class="st9" transform="translate(89.54 88.57)"><tspan x="0" y="0">CLAUDIA</tspan></text>
    </g>
    <text class="st3" transform="translate(236.91 80.94)"><tspan x="0" y="0">and</tspan></text>
